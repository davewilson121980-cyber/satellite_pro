{% extends "base.html" %}

{% block title %}403 - Forbidden{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-yellow-500 mb-4">403</h1>
        <h2 class="text-3xl font-semibold text-white mb-4">Access Denied</h2>
        <p class="text-gray-400 mb-8 max-w-md mx-auto">
            You don't have permission to access this resource. Please check your subscription plan or contact support.
        </p>
        <a href="{{ url_for('pricing.index') }}" 
           class="inline-block px-8 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
            View Plans
        </a>
    </div>
</div>
{% endblock %}
