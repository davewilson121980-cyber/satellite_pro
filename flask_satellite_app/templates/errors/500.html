{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-red-500 mb-4">500</h1>
        <h2 class="text-3xl font-semibold text-white mb-4">Server Error</h2>
        <p class="text-gray-400 mb-8 max-w-md mx-auto">
            Something went wrong on our end. Please try again later or contact support if the problem persists.
        </p>
        <a href="{{ url_for('dashboard.index') }}" 
           class="inline-block px-8 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
