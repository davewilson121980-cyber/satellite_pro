{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-primary-500 mb-4">404</h1>
        <h2 class="text-3xl font-semibold text-white mb-4">Page Not Found</h2>
        <p class="text-gray-400 mb-8 max-w-md mx-auto">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="{{ url_for('dashboard.index') }}" 
           class="inline-block px-8 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
