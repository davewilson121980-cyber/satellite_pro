{% extends "base.html" %}

{% block title %}Login - Satellite Analytics{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Login card -->
        <div class="bg-dark-card rounded-2xl border border-dark-border p-8 shadow-xl">
            <!-- Header -->
            <div class="text-center mb-8">
                <svg class="w-12 h-12 mx-auto text-primary-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <h1 class="text-2xl font-bold text-white">Welcome Back</h1>
                <p class="text-gray-400 mt-2">Sign in to access your dashboard</p>
            </div>
            
            <!-- Login form -->
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input type="text" id="username" name="username" required 
                           class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-colors"
                           placeholder="Enter your username">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-colors"
                           placeholder="Enter your password">
                </div>
                
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" name="remember" 
                               class="w-4 h-4 text-primary-600 bg-dark-bg border-dark-border rounded focus:ring-primary-500">
                        <span class="ml-2 text-sm text-gray-400">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-primary-400 hover:text-primary-300 transition-colors">
                        Forgot password?
                    </a>
                </div>
                
                <button type="submit" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white font-medium rounded-lg transition-all shadow-lg shadow-primary-900/50 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-dark-card">
                    Sign In
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-dark-border"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-dark-card text-gray-400">Don't have an account?</span>
                </div>
            </div>
            
            <!-- Register link -->
            <a href="{{ url_for('auth.register') }}" 
               class="block w-full py-3 px-4 text-center bg-dark-bg border border-dark-border hover:border-primary-500 text-gray-300 font-medium rounded-lg transition-colors">
                Create Account
            </a>
        </div>
        
        <!-- Additional info -->
        <p class="text-center text-sm text-gray-500 mt-6">
            By signing in, you agree to our 
            <a href="#" class="text-primary-400 hover:text-primary-300">Terms of Service</a> 
            and 
            <a href="#" class="text-primary-400 hover:text-primary-300">Privacy Policy</a>
        </p>
    </div>
</div>
{% endblock %}
