{% extends "base.html" %}

{% block title %}Register - Satellite Analytics{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-8">
    <div class="w-full max-w-md">
        <!-- Register card -->
        <div class="bg-dark-card rounded-2xl border border-dark-border p-8 shadow-xl">
            <!-- Header -->
            <div class="text-center mb-8">
                <svg class="w-12 h-12 mx-auto text-primary-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <h1 class="text-2xl font-bold text-white">Create Account</h1>
                <p class="text-gray-400 mt-2">Start analyzing satellite data today</p>
            </div>
            
            <!-- Register form -->
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input type="text" id="username" name="username" required minlength="3"
                           class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-colors"
                           placeholder="Choose a username">
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-colors"
                           placeholder="your@email.com">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" name="password" required minlength="8"
                           class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-colors"
                           placeholder="Min. 8 characters">
                </div>
                
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-gray-300 mb-2">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                           class="w-full px-4 py-3 bg-dark-bg border border-dark-border rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition-colors"
                           placeholder="Confirm your password">
                </div>
                
                <div class="flex items-start">
                    <input type="checkbox" id="terms" name="terms" required 
                           class="w-4 h-4 mt-0.5 text-primary-600 bg-dark-bg border-dark-border rounded focus:ring-primary-500">
                    <label for="terms" class="ml-2 text-sm text-gray-400">
                        I agree to the 
                        <a href="#" class="text-primary-400 hover:text-primary-300">Terms of Service</a> 
                        and 
                        <a href="#" class="text-primary-400 hover:text-primary-300">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white font-medium rounded-lg transition-all shadow-lg shadow-primary-900/50 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-dark-card">
                    Create Account
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-dark-border"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-dark-card text-gray-400">Already have an account?</span>
                </div>
            </div>
            
            <!-- Login link -->
            <a href="{{ url_for('auth.login') }}" 
               class="block w-full py-3 px-4 text-center bg-dark-bg border border-dark-border hover:border-primary-500 text-gray-300 font-medium rounded-lg transition-colors">
                Sign In
            </a>
        </div>
        
        <!-- Features -->
        <div class="mt-8 grid grid-cols-3 gap-4 text-center">
            <div class="p-4 bg-dark-card/50 rounded-lg border border-dark-border">
                <svg class="w-6 h-6 mx-auto text-primary-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                </svg>
                <p class="text-xs text-gray-400">Free Plan Available</p>
            </div>
            <div class="p-4 bg-dark-card/50 rounded-lg border border-dark-border">
                <svg class="w-6 h-6 mx-auto text-primary-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <p class="text-xs text-gray-400">Real-time Data</p>
            </div>
            <div class="p-4 bg-dark-card/50 rounded-lg border border-dark-border">
                <svg class="w-6 h-6 mx-auto text-primary-500 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
                <p class="text-xs text-gray-400">Secure & Private</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
